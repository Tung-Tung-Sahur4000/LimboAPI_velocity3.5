name: Build & Release

on:
  push:
    branches:
      - master
      - 'claude/**'
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0
      - name: Set up JDK
        uses: actions/setup-java@v4.7.0
        with:
          distribution: temurin
          java-version: 25
      - name: Cache generated data
        uses: actions/cache@v5.0.4
        with:
          path: |
            plugin/build/minecraft/
            plugin/build/generated/minecraft/mapping/
          key: minecraft-${{ hashFiles('gradle.properties') }}
      - name: Build LimboAPI
        run: ./gradlew build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: LimboAPI
          path: "*/build/libs/*.jar"
      - name: Locate plugin JAR
        id: jar
        run: |
          path="$(find plugin/build/libs -maxdepth 1 -name '*.jar' ! -name '*-javadoc.jar' ! -name '*-sources.jar' -printf '%p\n' | head -n1)"
          echo "path=${path}" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "${path}")" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      # Create/refresh a GitHub Release with the jar on every push (incl. merges to master).
      # Pull requests only build + upload an artifact (no release).
      - name: Publish release
        if: ${{ github.event_name != 'pull_request' }}
        uses: ncipollo/release-action@v1
        with:
          artifacts: ${{ steps.jar.outputs.path }}
          tag: build-${{ steps.jar.outputs.sha }}
          name: LimboAPI ${{ steps.jar.outputs.sha }} (${{ github.ref_name }})
          body: |
            Automated build of `${{ github.ref_name }}` at commit `${{ steps.jar.outputs.sha }}`.

            **Plugin jar:** `${{ steps.jar.outputs.name }}` (download below).
          prerelease: true
          allowUpdates: true
          makeLatest: true
          removeArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
